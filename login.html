<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Ceritaku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-logo large">C</div>
        <h1>Ceritaku</h1>
        <p>Masuk untuk melanjutkan bacaan dan menyimpan novel favoritmu.</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="username">Email / Username</label>
          <input type="text" id="username" placeholder="Masukkan email atau username" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Masukkan password" />
            <button type="button" class="pass-toggle" id="togglePassword">👁️</button>
          </div>
        </div>

        <div class="login-row">
          <label class="remember-check">
            <input type="checkbox" id="rememberMe" />
            <span>Ingat saya</span>
          </label>
          <a href="#" class="link-text">Lupa password?</a>
        </div>

        <button type="submit" class="primary-btn full">Masuk</button>
      </form>

      <div class="login-divider">atau</div>

      <button class="ghost-btn full" id="demoGoogleBtn">Lanjutkan dengan Google</button>

      <div class="login-foot">
        Belum punya akun? <a href="#">Daftar sekarang</a>
      </div>

      <button class="back-home-btn" id="backHomeBtn">← Kembali ke Beranda</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
